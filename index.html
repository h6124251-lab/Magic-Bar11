<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Magic Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,215,100,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,215,100,0.25), transparent 45%),
        linear-gradient(135deg, #0f7a3d, #1fa463, #0b5f32);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* Магические частицы */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(2px 2px at 20% 30%, gold 50%, transparent 51%),
        radial-gradient(2px 2px at 70% 60%, gold 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 40% 80%, gold 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 85% 20%, gold 50%, transparent 51%);
    background-size: 300px 300px;
    animation: sparkle 12s linear infinite;
    opacity: 0.6;
    pointer-events: none;
    z-index: 1;
}

@keyframes sparkle {
    from { transform: translateY(0); }
    to   { transform: translateY(-300px); }
}

.container {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    padding: 40px 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: gold;
    margin-bottom: 30px;
    text-shadow: 0 0 15px rgba(255,215,100,0.6);
}

.link {
    display: block;
    text-decoration: none;
    color: #ffffff;
    background: rgba(255,215,100,0.25);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 15px;
    font-size: 18px;
    transition: 0.3s ease;
}

.link:hover {
    background: rgba(255,215,100,0.45);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>Magic Bar</h1>

    <a class="link" href="https://m.vk.ru/beautymagicbarvrn" target="_blank">ВКонтакте</a>
    <a class="link" href="https://t.me/beautystudioMB" target="_blank">Telegram</a>
    <a class="link" href="https://yandex.ru/maps/org/magic_bar/84043874822" target="_blank">Яндекс Карты</a>
</div>

</body>
</html>
