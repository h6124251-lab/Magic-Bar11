<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Magic Bar</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    width: 300px;
}

.card h2 {
    margin-bottom: 25px;
    color: #333;
    letter-spacing: 1px;
}

.btn {
    display: block;
    text-decoration: none;
    padding: 12px;
    margin: 10px 0;
    border-radius: 30px;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.vk {
    background: #4c75a3;
}

.telegram {
    background: #2aabee;
}

.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">
    <h2>Magic Bar</h2>

    <a class="btn vk" href="https://vk.ru/mila_beautystudiomb" target="_blank">ВК</a>
    <a class="btn telegram" href="https://t.me/beautystudioMB" target="_blank">Телеграм</a>
</div>

</body>
</html>
